<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body class="tiktok-text">
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <div class="reel-bar">
        <i class="bi bi-play-btn"></i>
        <div class="reel-personal">
          <p>Esplora</p>
          <p>Seguiti</p>
          <p>Per te</p>
        </div>
        <i class="bi bi-search"></i>
      </div>
    </header>
    <!-- Sidebar -->
    <div class="sidebar">
      <img src="assets/img/boolean_logo.png" alt="logo" class="reel-img">
      <div class="interaction-item">
        <i class="bi bi-heart-fill"></i>
        <span>588</span>
      </div>
      <div class="interaction-item">
        <i class="bi bi-chat-dots-fill"></i>
        <span>13</span>
      </div>
      <div class="interaction-item">
        <i class="bi bi-bookmark-fill"></i>
        <span>638</span>
      </div>
      <div class="interaction-item">
        <i class="bi bi-sign-turn-slight-right-fill"></i>
        <span>491</span>
      </div>
    </div>
    <!-- Footer -->
    <footer>
      <div class="description">
        <strong>Boolean.careers</strong>
        <p>Prova il Fundamentals Camp.
          20 ore di corso gratuito per...<strong>Vedi altro</strong></p>
      </div>
    </footer>
  </div>

</body>

</html>
